# mise dev-environment for the proxmox-homelab pipeline (replaces direnv).
#   mise install          # provision the pinned toolchain
#   cp mise.local.toml.example mise.local.toml   # then fill in real secrets
#   mise run <task>       # plan / apply / play / fmt / test
#
# Non-secret config lives here (committed). All secret-bearing env vars live in
# the gitignored mise.local.toml (template: mise.local.toml.example) — DEC-001.

[tools]
opentofu = "1.12.2"
packer = "1.15.0"
python = "3.12"
# `just` task runner (bare key -> registry aqua:casey/just). Exact pin for
# reproducibility; recipes use the `[working-directory]` attribute (floor 1.38).
just = "1.53.0"
# The `ansible` community bundle only puts `ansible-community` on PATH; the
# workhorse CLIs (ansible-playbook, ansible-vault, ansible-galaxy, …) ship with
# ansible-core, so pin it explicitly to expose them (mise has no pipx
# --include-deps). ansible-lint is the Step-4+ config-layer gate that Step 12
# folds into `mise run test`.
"pipx:ansible" = "latest"
"pipx:ansible-core" = "latest"
"pipx:ansible-lint" = "latest"

[env]
# Non-secret Proxmox provider config (Tofu PROXMOX_VE_* scheme). The secret
# half (API token, SSH user) and the Packer PROXMOX_* vars are in
# mise.local.toml — see mise.local.toml.example.
PROXMOX_VE_ENDPOINT = "https://192.168.1.50:8006/api2/json"
PROXMOX_VE_INSECURE = "true"
# Create/activate a project venv so uv + pytest are available for `mise run test`.
_.python.venv = { path = ".venv", create = true }

[tasks.plan]
description = "tofu plan against the homelab config"
dir = "tofu"
run = "tofu plan"

[tasks.apply]
description = "tofu apply the homelab config"
dir = "tofu"
run = "tofu apply"

[tasks.play]
description = "run the Ansible site playbook"
dir = "ansible"
run = "ansible-playbook site.yml"

[tasks.gen-inventory]
description = "render ansible/inventory/hosts.yml from `tofu output`"
run = "python scripts/gen_inventory.py"

[tasks.fmt]
description = "format the OpenTofu config"
dir = "tofu"
run = "tofu fmt -recursive"

[tasks.test]
# The single aggregate offline backpressure gate (Step 12): every
# scripts/test_*.py shape-test (standalone __main__ exit code, NOT
# `pytest scripts/`) + tofu fmt-check/validate + ansible-lint --offline +
# ansible-playbook --syntax-check. See scripts/run_gate.py.
description = "run the full offline gate (shape-tests + tofu + ansible)"
run = "python scripts/run_gate.py"
