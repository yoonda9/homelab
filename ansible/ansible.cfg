# Ansible configuration for the proxmox-homelab config layer.
# Run via `just play` (dir = ansible). Inventory is rendered from
# `tofu output` by `just gen-inventory` (scripts/gen_inventory.py).
[defaults]
inventory = inventory/hosts.yml
# Our own roles in roles/, plus vendored Galaxy roles in galaxy_roles/ (pinned
# in requirements.yml, installed via `just galaxy`). Vendoring keeps the offline
# gate self-contained: once docker_host references geerlingguy.docker (step 2),
# --syntax-check / ansible-lint resolve it from galaxy_roles/ with no network.
roles_path = roles:galaxy_roles
# Vendored Galaxy COLLECTIONS live in the same dir, under the
# galaxy_roles/ansible_collections/ subtree that `ansible-galaxy collection
# install -p galaxy_roles` creates. roles_path does not cover collections, so
# without this key Ansible would look only in ~/.ansible/collections and
# /usr/share/ansible/collections and community.general.xml would need network.
collections_path = galaxy_roles
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
# The vault password is NOT committed: vault-pass.sh reads it from
# $ANSIBLE_VAULT_PASSWORD, which lives in the gitignored mise.local.toml
# (template: mise.local.toml.example).
vault_password_file = vault-pass.sh

[ssh_connection]
pipelining = True
