# Ansible configuration for the proxmox-homelab config layer.
# Run via `mise run play` (dir = ansible). Inventory is rendered from
# `tofu output` by `mise run gen-inventory` (scripts/gen_inventory.py).
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
# The vault password is NOT committed: vault-pass.sh reads it from
# $ANSIBLE_VAULT_PASSWORD, which lives in the gitignored mise.local.toml
# (template: mise.local.toml.example).
vault_password_file = vault-pass.sh

[ssh_connection]
pipelining = True
