proxmox_hosts:
  hosts:
    pve-01:
      ansible_host: "{{ pve_host | default('pve.example.com') }}"
      ansible_user: root
      pve_api_user: "root@pam"
      pve_api_password: "{{ pve_root_password | default('') }}"
      pve_api_token_id: "{{ pve_token_id | default(pve_api_user ~ '!' ~ (pve_token_id_name | default('ansible-token'))) }}"
      pve_api_token_secret: "{{ pve_token_secret | default('') }}"
