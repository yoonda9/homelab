---
# Ansible Galaxy role requirements for the ansible/ config layer.
#
# geerlingguy.docker will replace the custom Docker install (keyring / deb822 /
# apt / systemd tasks) in roles/docker_host. This file only DECLARES and pins
# the dependency; the role is wired into docker_host in a later step. Pinned to
# an EXACT version (never `latest`) for reproducibility, mirroring the repo's
# exact-pin convention for opentofu / packer / just.
#
# The offline gate (just test) cannot reach Galaxy, so once docker_host
# references this role it must also be vendored/resolvable on disk; that is the
# follow-up `resolvable` step (roles_path + `just galaxy`). Declaring it here
# does not yet reference it, so ansible-playbook --syntax-check is unaffected.
roles:
  - src: geerlingguy.docker
    version: 8.0.0

# Ansible Galaxy collection requirements.
#
# community.general provides community.general.xml, which a later step uses to
# edit Plex's Preferences.xml (TranscoderTempDirectory) idempotently — the repo
# otherwise constrains to ansible.builtin, so this is a deliberate, documented
# dependency. Pinned to an EXACT version (never `latest`) for reproducibility,
# mirroring the exact-pin convention above and across opentofu / packer / just.
# Installed via `just galaxy` (ansible-galaxy collection install). Declaring it
# here does not yet reference it, so ansible-playbook --syntax-check is
# unaffected until a role actually calls community.general.xml.
collections:
  - name: community.general
    version: 13.2.0
