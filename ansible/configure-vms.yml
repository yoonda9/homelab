---
# Configure the OpenTofu-provisioned Proxmox guests.
# Targets the `proxmox_vms` group emitted by scripts/tofu_to_inventory.py
# (which reads `tofu output -json ansible_inventory`).
#
# Usage:
#   tofu -chdir=tofu output -json ansible_inventory \
#     | python3 scripts/tofu_to_inventory.py
#   .venv/bin/ansible-playbook -i ansible/inventory/tofu_generated.yml \
#     ansible/configure-vms.yml

- name: Configure Tofu-provisioned guest VMs
  hosts: proxmox_vms
  gather_facts: true
  become: true
  roles:
    - vm_baseline
