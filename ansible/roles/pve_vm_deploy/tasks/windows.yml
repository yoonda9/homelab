---
- name: Deploy Proxmox Windows 11 VM shells from operator-staged ISOs
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_password: "{{ pve_api_password | default(omit) }}"
    api_token_id: "{{ pve_api_token_id | default(omit) }}"
    api_token_secret: "{{ pve_api_token_secret | default(omit) }}"
    api_host: "{{ pve_host }}"
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    memory: "{{ item.memory | default(8192) }}"
    cores: "{{ item.cores | default(4) }}"
    ostype: win11
    bios: ovmf
    machine: q35
    scsihw: virtio-scsi-single
    efidisk0: "{{ item.storage | default(pve_vm_storage) }}:1,efitype=4m,pre-enrolled-keys=1"
    tpmstate0: "{{ item.storage | default(pve_vm_storage) }}:1,version=v2.0"
    scsi0: "{{ item.storage | default(pve_vm_storage) }}:{{ item.disk_size | default(64) }}"
    ide2: "{{ item.install_iso }},media=cdrom"
    ide3: "{{ item.virtio_iso }},media=cdrom"
    net:
      net0: "virtio,bridge={{ item.bridge | default(pve_bridge_name) }}"
    boot: "order=ide2;scsi0"
    description: "{{ item.description | default('Provisioned by pve_vm_deploy (Windows ISO branch)') }}"
    state: present
  delegate_to: localhost
  loop: "{{ pve_windows_vms }}"
  loop_control:
    label: "{{ item.name }} (vmid={{ item.vmid }})"
