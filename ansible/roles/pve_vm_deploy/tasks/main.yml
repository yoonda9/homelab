---
- name: Deploy Proxmox VMs from cloud-init templates with DHCP
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_password: "{{ pve_api_password | default(omit) }}"
    api_token_id: "{{ pve_api_token_id | default(omit) }}"
    api_token_secret: "{{ pve_api_token_secret | default(omit) }}"
    api_host: "{{ pve_host }}"
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    clone: "{{ item.clone_from_vmid }}"
    memory: "{{ item.memory | default(2048) }}"
    cores: "{{ item.cores | default(2) }}"
    net:
      net0: "virtio,bridge={{ item.bridge | default(pve_bridge_name) }}"
    ipconfig0: "ip=dhcp,ip6=auto"
    description: "{{ item.description | default('Provisioned by pve_vm_deploy') }}"
    state: present
  delegate_to: localhost
  loop: "{{ pve_vms }}"
  loop_control:
    label: "{{ item.name }} (vmid={{ item.vmid }})"

- name: Include Windows 11 ISO-based deployment branch
  ansible.builtin.include_tasks: windows.yml
  when: pve_windows_vms | default([]) | length > 0
