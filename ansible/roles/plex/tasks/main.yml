---
- name: Check if Plex LXC Container exists
  ansible.builtin.command: "pct status {{ plex_vmid | default(110) }}"
  register: plex_status
  failed_when: false
  changed_when: false

- name: Deploy Plex LXC Container (via pct)
  ansible.builtin.command:
    cmd: >
      pct create {{ plex_vmid | default(110) }}
      {{ plex_ostemplate | default('local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst') }}
      --hostname plex
      --storage {{ plex_storage | default('local-lvm') }}
      --memory {{ plex_memory | default(2048) }}
      --rootfs {{ plex_storage | default('local-lvm') }}:{{ plex_disk | default(32) }}
      --net0 name=eth0,bridge=vmbr0,ip=dhcp
      --unprivileged 1
      --features nesting=1
      --description "Plex Media Server (iGPU passthrough requires manual setup)"
  when: plex_status.rc != 0
  changed_when: true

- name: Start Plex LXC Container
  ansible.builtin.command: "pct start {{ plex_vmid | default(110) }}"
  register: plex_start
  changed_when: "'already running' not in plex_start.stderr"
  failed_when:
    - plex_start.rc != 0
    - "'already running' not in plex_start.stderr"
