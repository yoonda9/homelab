---
# Run Plex Media Server on CT 110 with Intel QSV (iHD) hardware transcoding.
# ansible.builtin-only (the ansible-core venv has no community.* — mem-1781894740-5099);
# every task is idempotent: declared `state`, or a guarded command (changed_when).
# The /dev/dri passthrough + render(993)/video(44) idmap come from the Step-7 tofu
# module "plex"; this role makes the in-CT software use them.

- name: Ensure the apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the deb822 source manager dependency
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable the Debian non-free components (the iHD media driver lives there)
  ansible.builtin.deb822_repository:
    name: debian-extra-components
    types: deb
    uris: "{{ plex_debian_mirror }}"
    suites:
      - "{{ ansible_distribution_release }}"
      - "{{ ansible_distribution_release }}-updates"
    components: "{{ plex_nonfree_components }}"
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
    state: present
    enabled: true

- name: Install the Intel iHD media driver and VA-API tooling
  ansible.builtin.apt:
    name: "{{ plex_media_packages }}"
    state: present
    # No cache_valid_time: the prior python3-debian apt task freshly stamped the
    # apt cache BEFORE the Debian non-free deb822 source above was added, so a
    # cache_valid_time here would make the apt module SKIP the refresh (it only
    # updates when the cache is OLDER than the window) and the non-free repo —
    # home of intel-media-va-driver-non-free — would never be indexed -> "No
    # package matching 'intel-media-va-driver-non-free'". An unconditional
    # update_cache indexes the just-added non-free repo (mirrors the Plex install
    # task below).
    update_cache: true

- name: Add the Plex apt GPG key
  ansible.builtin.get_url:
    url: https://downloads.plex.tv/plex-keys/PlexSign.key
    dest: /etc/apt/keyrings/plex.asc
    owner: root
    group: root
    mode: "0644"

- name: Add the Plex apt repository
  ansible.builtin.deb822_repository:
    name: plexmediaserver
    types: deb
    uris: https://downloads.plex.tv/repo/deb
    suites: public
    components: main
    architectures: amd64
    signed_by: /etc/apt/keyrings/plex.asc
    # trusted:true is REQUIRED only for THIS source. Plex's signing key
    # (PlexSign.key, CD66 5CBA … 3ADC A79D) self-signs its uid (0x13
    # PositiveCertification) and subkey-binding (0x18) with SHA1. Debian trixie
    # verifies repo InRelease files with sqv (Sequoia), whose default crypto
    # policy rejects SHA1 self/binding signatures since 2026-02-01 -> the key is
    # "not bound" -> the Plex InRelease counts as unsigned -> apt refuses the
    # repo and the install below fails. We cannot re-sign the key (no Plex
    # private key), so scope an unconditional trust to this one source. The
    # Debian non-free source above keeps full sqv verification (signed_by, no
    # trusted) — the relax is Plex-only.
    trusted: true
    state: present
    enabled: true

# --- State-dir ownership gate (unprivileged idmap) --------------------------
# plex_state_dir is a bind mount from the host (plex_state_host_path). CT 110 is
# unprivileged with a single offset idmap tile, so the host directory must carry
# the SHIFTED ids (in-CT id + plex_idmap_base). A copy that preserved raw in-CT
# ownership lands outside the mapped range and surfaces in-CT as 65534 (nobody),
# leaving plex without write access — PMS then aborts in milliseconds with
# "Read/write access is required for path: ...". Pin the ids first so the package
# reuses them, then gate on the ownership before we install/start anything.

# --- Id migration to the pinned ids (design §4.2) ----------------------------
# A CT built before the pins carries whatever ids the package auto-allocated.
# Moving the ids is only half the job: the state dir behind the bind mount still
# carries the OLD ownership, so it must be chowned to match — and PMS must be
# stopped while that happens. The block is inert once the dir already matches the
# pins, which is the steady state (and all of Step 1: at 999:991 it never fires).

- name: Stat the Plex state directory before the id pins
  # MUST precede the pins, not merely the chown: `usermod -u` auto-chowns the
  # home tree's uid half as a side effect, so a stat taken AFTER the pins reads a
  # fact the guarded operation has already rewritten. Registers a stat result,
  # not a boolean — the derivation below is the single place that decides.
  ansible.builtin.stat:
    path: "{{ plex_state_dir }}"
  register: plex_state_premigration_stat

- name: Derive whether the state directory needs an ownership migration
  # DEC-007: the ONE definition site. Both guarded tasks below reference this
  # fact by name — do not inline the expression per-task; two copies drift, and
  # the provenance test needs the derivation to have an address.
  #
  # Keyed on the DIR's stat, NEVER on the getent user: the user's uid reads
  # "done" the moment usermod lands while the dir can still be half-migrated
  # (64000:991). That is the rejected design, and it wedges permanently.
  #
  # `exists` is required, not defensive: stat on an absent path has no `uid` key,
  # so the comparison RAISES rather than mis-answering. Jinja `and`
  # short-circuits, so `exists and (...)` is safe. Do NOT reach for
  # `| default(0)` — it type-checks and is wrong: 0 != 64000 is TRUE, which
  # chowns a nonexistent path and shadows the ownership gate's idmap diagnostic
  # below, the one message that tells the operator the bind mount is missing.
  ansible.builtin.set_fact:
    plex_chown_needed: >-
      {{ (plex_state_premigration_stat.stat.exists)
      and ((plex_state_premigration_stat.stat.uid | int) != (plex_uid | int)
      or (plex_state_premigration_stat.stat.gid | int) != (plex_gid | int)) }}

- name: Read the current plex user entry
  # Feeds the STOP predicate only — never the chown (see the provenance note
  # above). fail_key:false so a fresh rebuild, where the user does not exist yet,
  # leaves the key None instead of failing the play.
  ansible.builtin.getent:
    database: passwd
    key: "{{ plex_service_user }}"
    fail_key: false

- name: Stop Plex Media Server before an id migration
  ansible.builtin.service:
    name: plexmediaserver
    state: stopped
  # `usermod -u` refuses while the user owns running processes (F1), so PMS must
  # be down before the pins. Composition, not substitution: the
  # `or plex_chown_needed` half is load-bearing — on a recovery re-run the uid
  # already reads plex_uid, so keying on the user alone leaves PMS live while the
  # chown rewrites its state dir underneath it.
  when: >-
    ((ansible_facts.getent_passwd[plex_service_user] | default(none)) is not none
    and (ansible_facts.getent_passwd[plex_service_user][1] | int) != (plex_uid | int))
    or plex_chown_needed
  register: plex_stop_result
  # Tolerate a MISSING unit (fresh CT, package not yet installed) and nothing
  # else. `failed_when: false` would swallow every real stop failure too — this
  # matches only the module's not-found message, so a genuine "Job for
  # plexmediaserver.service failed" still fails the play loudly. Both directions
  # verified by execution against the real module.
  failed_when:
    - plex_stop_result is failed
    - >-
      'Could not find the requested service'
      not in (plex_stop_result.msg | default(''))

- name: Pin the plex group GID ahead of the package install
  ansible.builtin.group:
    name: "{{ plex_service_user }}"
    gid: "{{ plex_gid }}"
    system: true
    state: present

- name: Pin the plex user UID ahead of the package install
  ansible.builtin.user:
    name: "{{ plex_service_user }}"
    uid: "{{ plex_uid }}"
    group: "{{ plex_service_user }}"
    system: true
    create_home: false
    state: present

- name: Migrate state dir ownership to the pinned ids
  # `command: chown -R` is REQUIRED, not preferred — do NOT "modernise" this onto
  # ansible.builtin.file with recurse:yes, and note ansible-lint will NOT catch
  # the swap. The file module sets the top-level dir's attrs FIRST and then walks
  # pre-order, so an interrupted run leaves the top level already correct with the
  # tree beneath un-chowned -> plex_chown_needed reads FALSE -> the re-run skips
  # -> permanently wedged. GNU `chown -R` is post-order (the top level is chowned
  # LAST), which is the entire basis of the recovery guarantee.
  #
  # Runs BEFORE the ownership gate below: during a migration the dir is still at
  # the old ids while the pins are already new, so a chown after the gate would
  # fail the play on its own gate.
  ansible.builtin.command:
    cmd: chown -R {{ plex_uid }}:{{ plex_gid }} {{ plex_state_dir }}
  when: plex_chown_needed
  # `command:` is not idempotent by declaration, so the role's own invariant
  # (top of file) and the production lint profile both require changed_when. The
  # task only runs when the predicate says a change is due, so `true` is honest:
  # in Step 1 the predicate is false -> skipped, and skipped != changed.
  changed_when: true

- name: Stat the Plex state directory (the host bind mount lands here)
  ansible.builtin.stat:
    path: "{{ plex_state_dir }}"
  register: plex_state_stat

- name: Assert the Plex state directory carries idmap-shifted ownership
  ansible.builtin.assert:
    that:
      - plex_state_stat.stat.exists
      - plex_state_stat.stat.isdir
      - plex_state_stat.stat.uid | int == plex_uid | int
      - plex_state_stat.stat.gid | int == plex_gid | int
    fail_msg: >-
      {{ plex_state_dir }} must be owned by {{ plex_service_user }}
      ({{ plex_uid }}:{{ plex_gid }}) but reports
      {{ plex_state_stat.stat.uid | default('missing') }}:{{ plex_state_stat.stat.gid | default('missing') }}.
      65534:65534 (nobody) means the host directory behind the bind mount carries
      RAW in-CT ownership instead of idmap-shifted ownership, so plex cannot write
      and Plex Media Server aborts with "Read/write access is required for path".
      This role CANNOT repair it — in an unprivileged userns even in-CT root cannot
      chown ids outside the map. Fix it on the Proxmox host, targeting the BASE
      directory (not just Library/), then re-run:
      chown -R {{ (plex_idmap_base | int) + (plex_uid | int) }}:{{ (plex_idmap_base | int) + (plex_gid | int) }} {{ plex_state_host_path }}
      See docs/runbooks/plex-claim.md §5 "Ownership (unprivileged idmap)".
    success_msg: >-
      {{ plex_state_dir }} is owned by {{ plex_service_user }}
      ({{ plex_uid }}:{{ plex_gid }}) — the host bind mount is idmap-shifted correctly.

- name: Install Plex Media Server
  ansible.builtin.apt:
    name: plexmediaserver
    state: present
    # No cache_valid_time: the prior iHD-driver apt task freshly stamped the apt
    # cache, so a cache_valid_time here would make the apt module SKIP the refresh
    # (it only updates when the cache is OLDER than the window) and the Plex deb822
    # repo added just above would never be indexed -> "No package matching
    # 'plexmediaserver'". An unconditional update_cache indexes the new repo.
    update_cache: true

- name: Ensure the render group maps to the host render GID for /dev/dri access
  ansible.builtin.group:
    name: render
    gid: "{{ plex_render_gid }}"
    # non_unique: a re-run may find that the package installs in this role already
    # allocated `render` at a non-993 system GID while GID 993 got taken by another
    # auto-allocated group. Without non_unique, `groupmod -g 993 render` aborts with
    # "groupmod: GID '993' already exists" (changed=false) and never converges. With
    # non_unique the render group is forced onto the host render GID (993) idempotently
    # even when that GID is shared, which is what /dev/dri passthrough needs.
    non_unique: true
    state: present

- name: Ensure the video group maps to the host video GID for /dev/dri access
  ansible.builtin.group:
    name: video
    gid: "{{ plex_video_gid }}"
    # non_unique for the same reason as the render group above: a second `just play`
    # must reconcile `video` onto the host video GID (44) even if that GID is already
    # held, instead of aborting "groupmod: GID '44' already exists".
    non_unique: true
    state: present

- name: Add the plex user to the render/video groups so QSV can open /dev/dri
  ansible.builtin.user:
    name: "{{ plex_service_user }}"
    groups:
      - render
      - video
    append: true

- name: Ensure the plexmediaserver systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/plexmediaserver.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Pin LIBVA_DRIVER_NAME so QSV selects the iHD driver deterministically
  ansible.builtin.copy:
    dest: /etc/systemd/system/plexmediaserver.service.d/override.conf
    content: |
      [Service]
      Environment=LIBVA_DRIVER_NAME={{ plex_libva_driver }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart plexmediaserver

- name: Ensure Plex Media Server is enabled and running
  ansible.builtin.systemd:
    name: plexmediaserver
    enabled: true
    state: started
    daemon_reload: true

# --- Hardware-transcode acceptance gate (design §4.3/§6) -------------------
# Probe the VA-API driver on the render node and FAIL the play unless the modern
# Intel iHD driver is active. The wrong driver (i965) is a known QSV failure mode.
- name: Probe the VA-API driver on the render node
  ansible.builtin.command:
    cmd: "vainfo --display drm --device {{ plex_render_node }}"
  register: plex_vainfo
  changed_when: false
  failed_when: false

- name: Assert the Intel iHD driver is active (QSV hardware-transcode gate)
  ansible.builtin.assert:
    that:
      - "'iHD' in plex_vainfo.stdout"
    fail_msg: >-
      vainfo did not report the iHD driver (rc={{ plex_vainfo.rc }}). QSV hardware
      transcoding will not work — check intel-media-va-driver-non-free,
      LIBVA_DRIVER_NAME={{ plex_libva_driver }}, and the /dev/dri passthrough/idmap.
    success_msg: "VA-API reports the iHD driver — QSV hardware transcoding is ready."
