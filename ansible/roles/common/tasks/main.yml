---
# Baseline OS configuration. Every task is idempotent: declared `state` with
# ansible.builtin modules, no unguarded command/shell (AC4).

- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable periodic unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Set the system timezone
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Record the configured timezone
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ common_timezone }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Ensure the service group exists
  ansible.builtin.group:
    name: "{{ common_service_user }}"
    state: present

- name: Ensure the service user exists
  ansible.builtin.user:
    name: "{{ common_service_user }}"
    group: "{{ common_service_user }}"
    shell: /usr/sbin/nologin
    create_home: true
    state: present

- name: Harden sshd configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: "/usr/sbin/sshd -t -f %s"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ common_sshd_settings }}"
  notify: Restart ssh
