---
- name: Deploy Traefik VM (cloned from cloud template)
  community.proxmox.proxmox_kvm:
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ traefik_vmid | default(200) }}"
    name: "traefik"
    clone: "{{ traefik_clone_vmid | default(9000) }}"
    full: true
    memory: "{{ traefik_memory | default(1024) }}"
    cores: 2
    agent: 1
    net:
      net0: "virtio,bridge={{ pve_sdn_vnet_name | default('vnetdmz') }}"
    description: "Traefik reverse proxy (DMZ network)"
    state: started
  delegate_to: localhost
