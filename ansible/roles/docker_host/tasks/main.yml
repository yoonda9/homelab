---
# Bring up the Traefik smoke stack on CT 111. Docker CE + the compose plugin are
# installed FIRST by the geerlingguy.docker meta dependency (see meta/main.yml),
# so a running Docker daemon and `docker compose` are guaranteed before these
# tasks render the stack. ansible.builtin-only (the ansible-core venv has no
# community.docker — see mem-1781894740-5099); every task is idempotent: declared
# `state`, or a guarded ansible.builtin.command for `docker compose` (no builtin
# module).

- name: Create the compose project directory
  ansible.builtin.file:
    path: "{{ docker_host_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create the Traefik dynamic-config directory
  ansible.builtin.file:
    path: "{{ docker_host_project_dir }}/dynamic"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create the ACME certificate store with restrictive permissions
  ansible.builtin.file:
    path: "{{ docker_host_project_dir }}/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Render the compose project file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ docker_host_project_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0640"

# DNS-01 (le-dns-cf) is the SOLE resolver and CANNOT issue a cert without the
# Cloudflare token. env.j2 renders it with `| default('')`, so a missing key,
# an empty value, or a vault file scoped to the wrong group (secrets MUST live
# under group_vars/all/ — a top-level group_vars/vault.yml maps to a
# non-existent `vault` group and never loads) would otherwise render an EMPTY
# CF_DNS_API_TOKEN and silently break cert issuance. Fail loudly here instead.
- name: Assert the Cloudflare DNS-01 token is present in the vault
  when: acme_resolver == 'le-dns-cf'
  ansible.builtin.assert:
    that:
      - vault_cloudflare_dns_api_token is defined
      - (vault_cloudflare_dns_api_token | default('') | trim) | length > 0
    fail_msg: >-
      vault_cloudflare_dns_api_token is missing or empty. The le-dns-cf DNS-01
      resolver needs it to issue the *.{{ domain }} wildcard. Add it with
      `ansible-vault edit group_vars/all/vault.yml` under EXACTLY that key name
      (secrets must live under group_vars/all/; see docs/runbooks/host-bootstrap.md).
    quiet: true

- name: Render the Cloudflare token env file for DNS-01
  ansible.builtin.template:
    src: env.j2
    dest: "{{ docker_host_project_dir }}/.env"
    owner: root
    group: root
    mode: "0600"

- name: Render the Traefik static configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ docker_host_project_dir }}/traefik.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart traefik

- name: Render the Traefik dynamic configuration (middlewares + file provider)
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ docker_host_project_dir }}/dynamic/dynamic.yml"
    owner: root
    group: root
    mode: "0640"

# --- Extras stack supporting config (Step 10), mounted read-only. ---
- name: Create the extras config directories
  ansible.builtin.file:
    path: "{{ docker_host_project_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - prometheus
    - grafana/provisioning/datasources
    - grafana/provisioning/dashboards
    - grafana/dashboards
    - homepage
    # Homepage v1.x writes to /app/config/logs at startup. /app/config is bind-
    # mounted read-only, so runc cannot create the logs mountpoint under it
    # (mkdirat on a ro fs). Pre-create it on the host: the ro bind then exposes
    # the dir, and compose overlays a WRITABLE bind at that same path (below).
    - homepage/logs

- name: Render the Prometheus scrape configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ docker_host_project_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0640"

- name: Render the Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ docker_host_project_dir }}/grafana/provisioning/datasources/datasource.yml"
    owner: root
    group: root
    mode: "0640"

- name: Render the Grafana dashboard provider provisioning
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ docker_host_project_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    owner: root
    group: root
    mode: "0640"

- name: Install the Grafana starter dashboard
  ansible.builtin.copy:
    src: grafana-homelab-dashboard.json
    dest: "{{ docker_host_project_dir }}/grafana/dashboards/homelab.json"
    owner: root
    group: root
    mode: "0640"

- name: Render the Homepage service links
  ansible.builtin.template:
    src: homepage-services.yaml.j2
    dest: "{{ docker_host_project_dir }}/homepage/services.yaml"
    owner: root
    group: root
    mode: "0640"

- name: Install the static Homepage config
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ docker_host_project_dir }}/homepage/{{ item.dest }}"
    owner: root
    group: root
    mode: "0640"
  loop:
    - { src: homepage-settings.yaml, dest: settings.yaml }
    - { src: homepage-widgets.yaml, dest: widgets.yaml }

- name: Bring up the Traefik smoke stack
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ docker_host_project_dir }}"
  register: docker_host_compose_up
  changed_when: >-
    ('Started' in docker_host_compose_up.stderr)
    or ('Created' in docker_host_compose_up.stderr)
    or ('Recreated' in docker_host_compose_up.stderr)

# --- Production ACME store reset (Step 7, gated on docker_host_acme_reset). ---
# A caServer staging->prod flip does NOT re-issue on its own: acme.json is keyed by
# resolver name (le-dns-cf), so Traefik treats the staging cert as still valid and
# the `Restart traefik` handler preserves the file. The one-shot cutover therefore
# must EMPTY the store: stop Traefik (writing acme.json while running risks
# corruption), remove + recreate it empty at 0600, then start Traefik so the
# wildcard re-issues from LE prod. Gated off by default so ordinary runs never wipe
# live certs; enable with `-e docker_host_acme_reset=true`. The recreate task uses a
# plain `state: touch` (no modification_time: preserve) precisely so the file is a
# fresh, empty store — the opposite of the idempotent touch task above.
- name: Reset the ACME store for the production flip
  when: docker_host_acme_reset | bool
  block:
    - name: Stop Traefik before resetting the ACME store
      ansible.builtin.command:
        cmd: docker compose stop traefik
        chdir: "{{ docker_host_project_dir }}"
      register: docker_host_traefik_stop
      changed_when: "'Stopped' in docker_host_traefik_stop.stderr"

    - name: Remove the stale ACME store so prod certs re-issue
      ansible.builtin.file:
        path: "{{ docker_host_project_dir }}/acme.json"
        state: absent

    - name: Recreate an empty ACME store at 0600 for production issuance
      ansible.builtin.file:
        path: "{{ docker_host_project_dir }}/acme.json"
        state: touch
        owner: root
        group: root
        mode: "0600"

    - name: Start Traefik after resetting the ACME store
      ansible.builtin.command:
        cmd: docker compose start traefik
        chdir: "{{ docker_host_project_dir }}"
      register: docker_host_traefik_start
      changed_when: "'Started' in docker_host_traefik_start.stderr"
