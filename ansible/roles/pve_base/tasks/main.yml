---
- name: Proxmox API Authentication Configuration
  block:
    - name: Check for existing Proxmox API Token
      ansible.builtin.command: "pveum user token list {{ pve_api_user }} --output-format json"
      register: pve_base_token_list_output
      changed_when: false
      when: pve_api_token_id | default('') == "" or pve_api_token_secret | default('') == ""

    - name: Generate Proxmox API Token
      ansible.builtin.command: "pveum user token add {{ pve_api_user }} {{ pve_api_token_id }} --privsep 0 --output-format json"
      register: pve_base_token_create_output
      when:
        - (pve_api_token_id | default('') == "" or pve_api_token_secret | default('') == "")
        - pve_api_token_id not in (pve_base_token_list_output.stdout | from_json | map(attribute='tokenid') | list)
      changed_when: true

    - name: Display Generated API Token (Action Required) # noqa: no-handler
      ansible.builtin.debug:
        msg: |
          PROXMOX API TOKEN GENERATED:
          Token ID: {{ pve_api_user }}!{{ pve_api_token_id }}
          Token Secret: {{ (pve_base_token_create_output.stdout | from_json).value }}
          PLEASE STORE THESE SAFELY!
      when: pve_base_token_create_output is changed

- name: Modernize Repositories (DEB822)
  block:
    - name: Disable Legacy Proxmox Enterprise Repository
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    - name: Disable Legacy Proxmox No-Subscription Repository (pve-no-subscription.sources)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-no-subscription.sources
        state: absent

    - name: Check if proxmox-archive-keyring is installed
      ansible.builtin.command: dpkg-query -W -f='${Status}' proxmox-archive-keyring
      register: pve_base_proxmox_keyring_check
      failed_when: false
      changed_when: false

    - name: Download Proxmox archive keyring
      ansible.builtin.get_url:
        url: "https://enterprise.proxmox.com/debian/proxmox-release-{{ pve_debian_release | default('trixie') }}.gpg"
        dest: /usr/share/keyrings/proxmox-archive-keyring.gpg
        mode: '0644'
      when: pve_base_proxmox_keyring_check.rc != 0

    - name: Ensure python3-debian is installed for DEB822 support
      ansible.builtin.apt:
        name: python3-debian
        state: absent # We now use the version in /opt/ansible-venv/

    - name: Enable Proxmox No-Subscription Repository (DEB822)
      ansible.builtin.deb822_repository:
        name: pve-no-subscription
        types: deb
        uris: http://download.proxmox.com/debian/pve
        suites: "{{ pve_debian_release | default('trixie') }}"
        components: pve-no-subscription
        signed_by: /usr/share/keyrings/proxmox-archive-keyring.gpg
        state: present

- name: Suppress Subscription Nag
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: 'res\.data\.status\.toLowerCase\(\) !== [''"]active[''"]'
    replace: 'false'
    backup: true
  notify: Restart PVEproxy

- name: Ensure Proxmox Snippets Directory Exists
  ansible.builtin.file:
    path: /etc/pve/snippets
    state: directory
    mode: '0755'

- name: Stability Updates & Firmware Management
  block:
    - name: Ensure all packages are up to date (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install CPU Microcode and fwupd
      ansible.builtin.apt:
        name:
          - "{{ 'intel-microcode' if ansible_facts['processor'] | join(' ') | lower is search('intel') else 'amd64-microcode' }}"
          - fwupd
        state: present

    - name: Update Firmware with fwupd
      ansible.builtin.shell:
        cmd: "set -o pipefail && fwupdmgr refresh --force && fwupdmgr get-updates -y && fwupdmgr update -y"
      register: pve_base_fwupdmgr_output
      changed_when: "'Updates successfully applied' in pve_base_fwupdmgr_output.stdout"
      failed_when: false # It might fail if no updates are found or if hardware doesn't support it

- name: Hardened SSH Configuration
  block:
    - name: Secure PermitRootLogin (prohibit-password)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
      notify: Restart SSHD

    - name: Disable PasswordAuthentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: Restart SSHD

- name: Install Fail2Ban
  when: fail2ban_enabled is defined and fail2ban_enabled
  ansible.builtin.include_tasks: fail2ban.yml

- name: Proxmox Firewall Configuration
  when: pve_firewall_enabled is defined and pve_firewall_enabled
  ansible.builtin.include_tasks: firewall.yml

- name: Virtual Networking
  ansible.builtin.include_tasks: networking.yml

- name: Image Sync
  ansible.builtin.include_tasks: templates.yml

- name: Hardware Optimization
  block:
    - name: Configure ZFS ARC Limit
      ansible.builtin.copy:
        dest: /etc/modprobe.d/zfs.conf
        content: "options zfs zfs_arc_max={{ pve_zfs_arc_max | default(2147483648) }}"
        mode: '0644'
      notify: Update Initramfs

    - name: Ensure cpupowerutils is installed
      ansible.builtin.apt:
        name: linux-cpupower
        state: present

    - name: Configure CPU Governor
      ansible.builtin.command: "cpupower frequency-set -g {{ pve_cpu_governor | default('performance') }}"
      register: pve_base_cpupower_output
      changed_when: "'Setting' in pve_base_cpupower_output.stdout"
      failed_when: false # Might fail if hardware doesn't support the governor or cpupower is not working

    - name: Make CPU Governor persistent (via cron)
      ansible.builtin.cron:
        name: "Set CPU Governor at boot"
        special_time: reboot
        job: "cpupower frequency-set -g {{ pve_cpu_governor | default('performance') }}"

- name: Backup Schedule
  when: pve_backup_enabled is defined and pve_backup_enabled
  ansible.builtin.include_tasks: backup.yml

- name: Prometheus
  ansible.builtin.include_tasks: prometheus.yml

- name: Third-Party Repositories (Telegraf, Grafana)
  ansible.builtin.include_tasks: third_party_repos.yml

- name: Logging and Metrics
  ansible.builtin.include_tasks: logging.yml

- name: Grafana Visualization Service
  when: grafana_enabled is defined and grafana_enabled
  ansible.builtin.include_tasks: grafana.yml
