---
- name: Download LXC Templates
  community.proxmox.proxmox_template:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_facts['hostname'] }}"
    storage: "{{ pve_storage | default('local') }}"
    content_type: vztmpl
    template: "{{ item }}"
    state: present
  loop: "{{ pve_lxc_templates }}"

- name: Download ISOs
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "/var/lib/vz/template/iso/{{ item | basename }}"
    mode: '0644'
  loop: "{{ pve_iso_urls }}"

- name: Download Cloud Images
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "/tmp/{{ item.name }}.qcow2"
    mode: '0644'
  loop: "{{ pve_cloud_images }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create VM Shell for Cloud Image
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    memory: 2048
    cores: 2
    scsihw: virtio-scsi-pci
    agent: 1
    net:
      net0: "virtio,bridge=vmbr0"
    state: present
  delegate_to: localhost
  loop: "{{ pve_cloud_images }}"
  loop_control:
    label: "{{ item.name }}"

- name: Import Cloud Image Disk
  ansible.builtin.shell:
    cmd: "qm disk import {{ item.vmid }} /tmp/{{ item.name }}.qcow2 {{ pve_vm_storage | default('local-lvm') }}"
  loop: "{{ pve_cloud_images }}"
  loop_control:
    label: "{{ item.name }}"
  register: pve_base_disk_import_output
  changed_when: "'Successfully imported' in pve_base_disk_import_output.stdout"

- name: Attach Disk and Configure Cloud-Init # noqa: no-handler
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      qm set {{ item.vmid }} --agent 1
      qm set {{ item.vmid }} --scsihw virtio-scsi-pci --scsi0 {{ pve_vm_storage | default('local-lvm') }}:vm-{{ item.vmid }}-disk-0
      qm set {{ item.vmid }} --ide2 {{ pve_vm_storage | default('local-lvm') }}:cloudinit
      qm set {{ item.vmid }} --boot c --bootdisk scsi0
      qm set {{ item.vmid }} --serial0 socket --vga serial0
  loop: "{{ pve_cloud_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: pve_base_disk_import_output is changed
  changed_when: true

- name: Convert VM to Template
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    template: true
    update: true
    state: present
  delegate_to: localhost
  loop: "{{ pve_cloud_images }}"
  loop_control:
    label: "{{ item.name }}"
