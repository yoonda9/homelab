---
- name: Check if Pi-hole LXC Container exists
  ansible.builtin.command: "pct status {{ pihole_vmid | default(111) }}"
  register: pihole_status
  failed_when: false
  changed_when: false

- name: Deploy Pi-hole LXC Container (via pct)
  ansible.builtin.command:
    cmd: >
      pct create {{ pihole_vmid | default(111) }}
      {{ pihole_ostemplate | default('local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst') }}
      --hostname pihole
      --storage {{ pihole_storage | default('local-lvm') }}
      --memory {{ pihole_memory | default(512) }}
      --rootfs {{ pihole_storage | default('local-lvm') }}:{{ pihole_disk | default(8) }}
      --net0 name=eth0,bridge=vmbr0,ip=dhcp
      --unprivileged 1
      --features nesting=1
      --description "Pi-hole DNS filtering"
  when: pihole_status.rc != 0
  changed_when: true

- name: Start Pi-hole LXC Container
  ansible.builtin.command: "pct start {{ pihole_vmid | default(111) }}"
  register: pihole_start
  changed_when: "'already running' not in pihole_start.stderr"
  failed_when:
    - pihole_start.rc != 0
    - "'already running' not in pihole_start.stderr"
