---
- name: Deploy Plex LXC Container
  community.proxmox.proxmox:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_hostname }}"
    vmid: "{{ plex_vmid | default(110) }}"
    hostname: "plex"
    ostemplate: "{{ plex_ostemplate | default('local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst') }}"
    storage: "{{ plex_storage | default('local-lvm') }}"
    memory: "{{ plex_memory | default(2048) }}"
    disk: "{{ plex_disk | default(32) }}"
    cores: 2
    unprivileged: false
    features:
      - nesting=1
      - mount=nfs;cifs
    mounts:
      mp0: "/dev/dri/renderD128,mp=/dev/dri/renderD128"
    description: "Plex Media Server (iGPU passthrough for HW transcoding)"
    state: present
  delegate_to: localhost

- name: Deploy Pi-hole LXC Container
  community.proxmox.proxmox:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_hostname }}"
    vmid: "{{ pihole_vmid | default(111) }}"
    hostname: "pihole"
    ostemplate: "{{ pihole_ostemplate | default('local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst') }}"
    storage: "{{ pihole_storage | default('local-lvm') }}"
    memory: "{{ pihole_memory | default(512) }}"
    disk: "{{ pihole_disk | default(8) }}"
    cores: 1
    unprivileged: true
    nameserver: "{{ pihole_dns_upstream | default('1.1.1.1 9.9.9.9') }}"
    features:
      - nesting=1
    description: "Pi-hole DNS filtering (upstream: {{ pihole_dns_upstream | default('1.1.1.1 9.9.9.9') }})"
    state: present
  delegate_to: localhost

- name: Deploy Traefik VM (cloned from cloud template)
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_hostname }}"
    vmid: "{{ traefik_vmid | default(200) }}"
    name: "traefik"
    clone: "{{ traefik_clone_vmid | default(9000) }}"
    full: true
    memory: "{{ traefik_memory | default(1024) }}"
    cores: 2
    net:
      net0: "virtio,bridge={{ pve_sdn_vnet_name | default('vnet-dmz') }}"
    description: "Traefik reverse proxy (DMZ network)"
    state: present
  delegate_to: localhost

- name: Deploy Bitwarden VM (cloned from cloud template)
  community.proxmox.proxmox_kvm:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_hostname }}"
    vmid: "{{ bitwarden_vmid | default(201) }}"
    name: "bitwarden"
    clone: "{{ bitwarden_clone_vmid | default(9000) }}"
    full: true
    memory: "{{ bitwarden_memory | default(4096) }}"
    cores: 2
    ciuser: "{{ bitwarden_ciuser | default('bitwarden') }}"
    cicustom: "vendor=local:snippets/bitwarden-cloud-init.yml"
    description: "Bitwarden on-premise (Docker Compose via cloud-init)"
    state: present
  delegate_to: localhost

- name: Deploy Uptime Kuma LXC Container
  community.proxmox.proxmox:
    api_user: "{{ pve_api_user | default('root@pam') }}"
    api_token_id: "{{ pve_token_id }}"
    api_token_secret: "{{ pve_token_secret }}"
    api_host: "{{ ansible_host }}"
    validate_certs: false
    node: "{{ ansible_hostname }}"
    vmid: "{{ uptimekuma_vmid | default(112) }}"
    hostname: "uptimekuma"
    ostemplate: "{{ uptimekuma_ostemplate | default('local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst') }}"
    storage: "{{ uptimekuma_storage | default('local-lvm') }}"
    memory: "{{ uptimekuma_memory | default(512) }}"
    disk: "{{ uptimekuma_disk | default(8) }}"
    cores: 1
    unprivileged: true
    features:
      - nesting=1
    description: "Uptime Kuma availability monitoring (Plex, Bitwarden, Pi-hole via Traefik)"
    state: present
  delegate_to: localhost

- name: Deploy Uptime Kuma monitors configuration
  ansible.builtin.copy:
    content: |
      {
        "version": "1.21.3",
        "notificationList": [],
        "monitorList": [
          {
            "name": "Plex",
            "type": "http",
            "url": "{{ uptimekuma_monitor_plex_url | default('http://plex.local:32400/web') }}",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "active": true
          },
          {
            "name": "Bitwarden",
            "type": "http",
            "url": "{{ uptimekuma_monitor_bitwarden_url | default('https://bitwarden.local') }}",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "active": true
          },
          {
            "name": "Pi-hole",
            "type": "http",
            "url": "{{ uptimekuma_monitor_pihole_url | default('http://pihole.local/admin') }}",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "active": true
          }
        ]
      }
    dest: "/etc/pve/snippets/uptimekuma-monitors.json"
    mode: "0644"
