text
reboot

lang en_US.UTF-8
keyboard us
timezone UTC --utc

network --bootproto=dhcp --onboot=yes --activate
rootpw --lock
selinux --enforcing
firewall --enabled --service=ssh
services --enabled=sshd

bootloader --location=mbr --append="biosdevname=0 net.ifnames=0"
zerombr
clearpart --all --initlabel
autopart --type=lvm

user --name=user --password=password --plaintext --groups=wheel

%packages
@^workstation-product-environment
python3
openssh-server
qemu-guest-agent
cloud-init
cloud-utils-growpart
%end

%post --erroronfail
set -euo pipefail
systemctl enable sshd qemu-guest-agent
sed -i 's/^#*PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config
echo 'user ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/99-user-nopasswd
chmod 0440 /etc/sudoers.d/99-user-nopasswd
%end
